{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="row">
    <div class="col-md-6">
      <div class="card gh-box mb-3">
        <div class="card-body">
          <h5>Add User</h5>
          <form method="post">
            <div class="mb-2">
              <label class="form-label">Email</label>
              <input name="email" type="email" class="form-control gh-input" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Password</label>
              <input name="password" type="password" class="form-control gh-input" required>
            </div>
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" name="is_admin" id="is_admin">
              <label class="form-check-label" for="is_admin">Admin</label>
            </div>
            <button class="btn btn-primary">Create</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card gh-box">
        <div class="card-body">
          <h5>Users</h5>
          <ul class="list-group list-group-flush">
            {% for u in users %}
            <li class="list-group-item d-flex justify-content-between">
              <span>{{ u.email }}</span>
              {% if u.is_admin %}<span class="badge bg-success">Admin</span>{% endif %}
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
