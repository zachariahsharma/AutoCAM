{% extends 'base.html' %}
{% block content %}
<div class="row">
  <div class="col-md-4">
    <div class="card gh-box">
      <div class="card-body text-white-50">
        <h5>Task</h5>
        <div class="text-white"><strong>Name:</strong> {{ task.name }}</div>
        <div class="text-white"><strong>Material:</strong> {{ task.Material }}</div>
        <div class="text-white"><strong>Thickness:</strong> {{ thickness }}</div>
        <div class="text-white"><strong>Parts:</strong> {{ task.Parts|length }}</div>
        <form method="post" action="{{ url_for('main.auto_breakdown', task_id=task._id) }}" class="mt-3">
          <button class="btn btn-primary">Request Auto Breakdown</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card gh-box">
      <div class="card-body">
        <h6>Parts</h6>
        <ul class="list-group list-group-flush" style="max-height:400px; overflow:auto;">
          {% for p in task.Parts %}
          <li class="list-group-item">{{ p }}</li>
          {% else %}
          <li class="list-group-item">No parts.</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}
