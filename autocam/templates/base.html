<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoCAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  </head>
  <body class="bg-body text-foreground">
    <nav class="navbar navbar-expand-lg navbar-dark gh-header border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand gh-brand" href="{{ url_for('main.dashboard') }}">AutoCAM</a>
        <div class="d-flex gap-3">
          <a class="nav-link gh-link" href="{{ url_for('main.settings') }}">Settings</a>
          <a class="nav-link gh-link" href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
      </div>
    </nav>
    <div class="container-fluid py-3">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="container">
            {% for category, message in messages %}
              <div class="alert alert-{{ 'warning' if category=='danger' else category }} gh-alert">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
