{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h4>FTC Upload</h4>
  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Material</label>
      <select name="material" class="form-select gh-input text-white" required>
        <option value="AL 6061">AL 6061</option>
        <option value="Polycarb">Polycarb</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Thickness</label>
      <input type="number" step="0.001" class="form-control gh-input text-white" name="thickness">
    </div>
    <div class="mb-3">
      <label class="form-label">Files</label>
      <input type="file" class="form-control" name="files" multiple required>
      <div class="form-text text-white-50">Select one or more drawing files to treat as parts.</div>
    </div>
    <button class="btn btn-primary">Continue</button>
  </form>
</div>
{% endblock %}
