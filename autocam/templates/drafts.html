{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="card gh-box">
    <div class="card-body">
      <h5>Drafts</h5>
      <ul class="list-group list-group-flush">
        {% for d in drafts %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <div class="fw-bold">Task {{ d.task_id }}</div>
            <div class="small text-secondary">{{ d._id }}</div>
          </div>
          <form method="post" action="{{ url_for('main.delete_draft_route', draft_id=d._id) }}">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </li>
        {% else %}
        <li class="list-group-item">No drafts.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
