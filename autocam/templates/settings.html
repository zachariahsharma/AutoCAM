{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:560px;">
  <div class="card gh-box">
    <div class="card-body">
      <h5>Settings</h5>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">API Base URL</label>
          <select name="api_base_url" class="form-select gh-input">
            {% for u in allowed %}
            <option value="{{ u }}" {% if current == u %}selected{% endif %}>{{ u }}</option>
            {% endfor %}
          </select>
          <div class="form-text">Choose from known URLs or add your own.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Add Custom URL</label>
          <input name="custom_api_base_url" type="url" class="form-control gh-input" placeholder="https://api.example.com">
          <div class="form-text">Must be http(s)://host[:port]. It will be added to your allowed list and selected.</div>
        </div>
        <button class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
