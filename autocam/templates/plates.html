{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Plates for {{ plates_doc.material }} — {{ plates_doc.thickness }}</h4>
    <form method="post" action="{{ url_for('main.save_plates_route', plates_id=plates_doc._id) }}" onsubmit="return savePlates()">
      <input type="hidden" name="plates_json" id="plates_json">
      <button class="btn btn-success">Save</button>
    </form>
  </div>

  <div id="platesContainer" class="row g-3"></div>

  <div class="mt-3">
    <button class="btn btn-outline-primary" onclick="addPlate()">Add Plate</button>
  </div>
</div>

<script>
const initialPlates = {{ plates_doc.plates|tojson }};

function renderPlates() {
  const container = document.getElementById('platesContainer');
  container.innerHTML = '';
  initialPlates.forEach((plate, idx) => {
    if (plate.hidden) return; // hidden plates not visible to viewer
    const col = document.createElement('div');
    col.className = 'col-lg-6';
    col.innerHTML = `
      <div class="card gh-box">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="fw-semibold">${plate.name || 'Plate ' + (idx+1)}</div>
            <div>
              <form method="post" action="${(plate.cam_bundle_rel && plate.cam_download_url) ? '#' : '{{ url_for('main.cam_request', plates_id=plates_doc._id, plate_id='') }}${plate.plateId}'}" class="d-inline">
                <select name="machine" class="form-select form-select-sm gh-input d-inline w-auto">
                  <option value="IQ">IQ</option>
                  <option value="Swift">Swift</option>
                </select>
                <button class="btn btn-sm btn-primary" ${(plate.cam_bundle_rel && plate.cam_download_url) ? 'disabled' : ''}>CAM</button>
              </form>
              ${(plate.cam_bundle_rel && plate.cam_download_url) ? `<a class=\"btn btn-sm btn-outline-primary ms-2\" href=\"${plate.cam_download_url}\">Download</a>` : ''}
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col">
              <label class="form-label small">Width</label>
              <input type="number" step="0.01" class="form-control form-control-sm gh-input" value="${plate.Width || 24}" onchange="plate.Width=this.valueAsNumber">
            </div>
            <div class="col">
              <label class="form-label small">Length</label>
              <input type="number" step="0.01" class="form-control form-control-sm gh-input" value="${plate.Length || 48}" onchange="plate.Length=this.valueAsNumber">
            </div>
            <div class="col">
              <label class="form-label small">True Depth</label>
              <input type="number" step="0.001" class="form-control form-control-sm gh-input" value="${plate.trueDepth || 0}" onchange="plate.trueDepth=this.valueAsNumber">
            </div>
          </div>
          <ul id="list-${plate.plateId}" class="list-group list-group-flush min-vh-25" style="min-height:220px;">
          </ul>
        </div>
      </div>`;
    container.appendChild(col);

    const listEl = col.querySelector(`#list-${plate.plateId}`);
    ;(plate.Parts || []).forEach(item => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';
      li.dataset.partName = item.name;
      li.innerHTML = `<span>${item.name}</span>
        <div>
          <input type="number" min="0" class="form-control form-control-sm gh-input d-inline w-auto" value="${item.quantity}" onchange="item.quantity=this.valueAsNumber">
        </div>`;
      listEl.appendChild(li);
    });

    new Sortable(listEl, {
      group: 'shared',
      animation: 150,
      onAdd: function (evt) {
        const partName = evt.item.dataset.partName;
        const fromId = evt.from.id.replace('list-','');
        const toId = evt.to.id.replace('list-','');
        const fromPlate = initialPlates.find(p => p.plateId === fromId);
        const toPlate = initialPlates.find(p => p.plateId === toId);
        const idxFrom = evt.oldIndex;
        const moved = fromPlate.Parts.splice(idxFrom, 1)[0];
        toPlate.Parts.splice(evt.newIndex, 0, moved);
      },
      onEnd: function(evt){
        const id = evt.to.id.replace('list-','');
        const plate = initialPlates.find(p => p.plateId === id);
        const items = Array.from(evt.to.querySelectorAll('li'));
        plate.Parts = items.map(li => ({ name: li.dataset.partName, quantity: parseInt(li.querySelector('input').value || '0', 10) }));
      }
    });
  });
}

function addPlate(){
  initialPlates.push({ plateId: crypto.randomUUID(), name: `Plate ${initialPlates.length+1}`, Width: 24, Length: 48, trueDepth: {{ plates_doc.thickness|tojson }}, Parts: [] });
  renderPlates();
}

function savePlates(){
  document.getElementById('plates_json').value = JSON.stringify(initialPlates);
  return true;
}

renderPlates();
</script>
{% endblock %}
